<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TV Portal</title>
    <meta name="description" content="90 live channels. Broadcast monitor.">
    <meta name="theme-color" content="#0b1220">
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230b1220'/><rect x='18' y='30' width='64' height='40' rx='6' fill='%2333415c'/><rect x='24' y='36' width='16' height='28' rx='3' fill='%233fa9f5'/><rect x='44' y='36' width='16' height='28' rx='3' fill='%233fa9f5'/><rect x='64' y='36' width='12' height='28' rx='3' fill='%233fa9f5'/></svg>">
    <style>
        :root {
            --rack: #0b1220;
            --steel: #33415c;
            --steel-light: #4a5a75;
            --steel-dark: #1a2332;
            --aqua: #3fa9f5;
            --aqua-dark: #2a8fd4;
            --aqua-light: #7ec8f7;
            --green: #4bffa0;
            --amber: #ffb020;
            --text: #c0c8d8;
            --text-dim: #8a94a8;
            --text-dark: #5a6478;
            --lcd-bg: #080c14;
            --lcd-border: #1a2332;
            --font-body: Tahoma, Verdana, Geneva, sans-serif;
            --font-lcd: 'VT323', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-body);
            background: var(--rack);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-size: 12px;
            line-height: 1.4;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--steel); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--steel-light); }

        *:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px rgba(63, 169, 245, 0.4);
            border-radius: 3px;
        }

        /* ===== RACK ===== */
        .rack {
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: var(--rack);
        }

        /* ===== OS WINDOW ===== */
        .os-window {
            width: 100%;
            max-width: 1024px;
            height: 100%;
            max-height: 768px;
            background: var(--rack);
            border: 1px solid var(--steel);
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ===== CHROME HEADER (brushed metal) ===== */
        .chrome-header {
            height: 32px;
            min-height: 32px;
            background:
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px),
                linear-gradient(180deg, #6a7a95 0%, #5a6a85 30%, #4a5a75 60%, #3a4a65 100%);
            border-bottom: 1px solid var(--steel-dark);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
            position: relative;
            flex-shrink: 0;
            user-select: none;
        }

        .chrome-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.08) 40%, transparent 100%);
            pointer-events: none;
            border-radius: 8px 8px 0 0;
        }

        .traffic-lights {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .tl {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.25);
            box-shadow:
                inset 0 1px 2px rgba(255,255,255,0.4),
                inset 0 -1px 1px rgba(0,0,0,0.1),
                0 1px 2px rgba(0,0,0,0.2);
            cursor: pointer;
            padding: 0;
            background: transparent;
            transition: transform 0.1s;
            position: relative;
        }

        .tl::after {
            content: '';
            position: absolute;
            top: 2px; left: 3px;
            width: 4px; height: 3px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            filter: blur(1px);
        }

        .tl:hover { transform: scale(1.15); }
        .tl:active { transform: scale(0.95); }

        .tl-close { background: #ff5f57; }
        .tl-min { background: #ffbd2e; }
        .tl-max { background: #28c840; }

        .chrome-title {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: bold;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            letter-spacing: 0.02em;
            position: relative;
            z-index: 1;
            flex: 1;
            text-align: center;
            margin-left: -52px;
        }

        .chrome-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            position: relative;
            z-index: 1;
        }

        .lcd-readout {
            font-family: var(--font-lcd);
            font-size: 16px;
            line-height: 1;
            color: var(--green);
            background: var(--lcd-bg);
            padding: 2px 8px;
            border: 1px solid var(--lcd-border);
            border-radius: 3px;
            text-shadow: 0 0 6px var(--green), 0 0 12px rgba(75, 255, 160, 0.3);
            letter-spacing: 0.05em;
            min-width: 28px;
            text-align: center;
        }

        .lcd-readout.amber {
            color: var(--amber);
            text-shadow: 0 0 6px var(--amber), 0 0 12px rgba(255, 176, 32, 0.3);
        }

        .lcd-label {
            font-family: var(--font-lcd);
            font-size: 11px;
            color: var(--text-dark);
            letter-spacing: 0.08em;
        }

        /* ===== WINDOW BODY ===== */
        .window-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== BROWSER PANEL ===== */
        .browser-panel {
            width: 300px;
            min-width: 300px;
            border-right: 1px solid var(--steel);
            display: flex;
            flex-direction: column;
            background: var(--rack);
        }

        .browser-header {
            padding: 10px 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid var(--steel);
            flex-shrink: 0;
        }

        .search-field {
            font-family: var(--font-body);
            font-size: 12px;
            padding: 5px 10px;
            background: var(--lcd-bg);
            border: 1px solid var(--steel);
            border-top: 1px solid var(--steel-dark);
            border-radius: 5px;
            color: var(--text);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.03);
            outline: none;
            width: 100%;
        }

        .search-field::placeholder { color: var(--text-dark); }
        .search-field:focus { border-color: var(--aqua); }

        .gel-nav {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .gel-nav::-webkit-scrollbar { display: none; }

        .gel-btn {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: bold;
            padding: 5px 12px;
            border: 1px solid #1a5a8a;
            border-top: 1px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            background: linear-gradient(180deg, var(--aqua-light) 0%, var(--aqua) 49%, var(--aqua-dark) 50%, #1e7ab8 100%);
            color: #fff;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 1px 2px rgba(0,0,0,0.3);
            white-space: nowrap;
            transition: all 0.1s;
            letter-spacing: 0.01em;
        }

        .gel-btn:hover {
            background: linear-gradient(180deg, #a8d8f8 0%, #5dbcf6 49%, #3fa9f5 50%, #2a8fd4 100%);
        }

        .gel-btn:active, .gel-btn.active {
            background: linear-gradient(180deg, #1e7ab8 0%, #2a8fd4 50%, var(--aqua-dark) 51%, var(--aqua) 100%);
            border-top: 1px solid rgba(0,0,0,0.15);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.05);
            padding-top: 6px;
            padding-bottom: 4px;
        }

        .gel-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .gel-btn-sm {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border: 1px solid #1a5a8a;
            border-top: 1px solid rgba(255,255,255,0.4);
            border-radius: 5px;
            background: linear-gradient(180deg, var(--aqua-light) 0%, var(--aqua) 49%, var(--aqua-dark) 50%, #1e7ab8 100%);
            color: #fff;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 1px 2px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .gel-btn-sm:hover {
            background: linear-gradient(180deg, #a8d8f8 0%, #5dbcf6 49%, #3fa9f5 50%, #2a8fd4 100%);
        }

        .gel-btn-sm:active {
            background: linear-gradient(180deg, #1e7ab8 0%, #2a8fd4 50%, var(--aqua-dark) 51%, var(--aqua) 100%);
            border-top: 1px solid rgba(0,0,0,0.15);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .gel-btn-sm:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* Channel list */
        .channel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px 6px;
        }

        .section-label {
            font-family: var(--font-body);
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dark);
            padding: 10px 6px 3px;
            border-top: 1px solid var(--steel);
            margin-top: 2px;
        }
        .section-label:first-child { border-top: none; margin-top: 0; }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.1s;
            border: 1px solid transparent;
            position: relative;
            outline: none;
            margin-bottom: 1px;
        }

        .channel-item:hover {
            background: rgba(63, 169, 245, 0.06);
            border-color: rgba(63, 169, 245, 0.1);
        }

        .channel-item.active {
            background: rgba(63, 169, 245, 0.12);
            border-color: rgba(63, 169, 245, 0.2);
        }

        .channel-item.active .ch-num {
            background: var(--aqua);
            color: var(--rack);
            border-color: var(--aqua);
            text-shadow: none;
            font-weight: bold;
        }

        .channel-item.active .ch-name { color: var(--aqua); }
        .channel-item.active .ch-tag { color: var(--aqua-light); }

        .ch-num {
            font-family: var(--font-lcd);
            font-size: 14px;
            color: var(--green);
            background: var(--lcd-bg);
            padding: 1px 6px;
            border: 1px solid var(--lcd-border);
            border-radius: 3px;
            min-width: 30px;
            text-align: center;
            text-shadow: 0 0 4px var(--green);
            line-height: 1.2;
            flex-shrink: 0;
        }

        .ch-info { flex: 1; min-width: 0; }

        .ch-name {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: bold;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .ch-tag {
            font-family: var(--font-body);
            font-size: 10px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .ch-fav {
            width: 22px;
            height: 22px;
            border-radius: 3px;
            border: none;
            background: transparent;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.1s;
            padding: 0;
            font-size: 13px;
            flex-shrink: 0;
        }

        .channel-item:hover .ch-fav { opacity: 1; }
        .ch-fav:hover { color: var(--amber); background: rgba(255, 176, 32, 0.1); }
        .ch-fav.is-fav { opacity: 1; color: var(--amber); }

        .empty-list {
            padding: 30px 16px;
            text-align: center;
            color: var(--text-dark);
            font-family: var(--font-body);
            font-size: 12px;
        }

        /* Badge rail */
        .badge-rail {
            padding: 8px 10px;
            border-top: 1px solid var(--steel);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(0,0,0,0.15);
        }

        .badge {
            width: 88px;
            height: 31px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #fff;
            border: 1px solid #1a5a8a;
            border-top: 1px solid rgba(255,255,255,0.35);
            border-radius: 4px;
            background: linear-gradient(180deg, var(--aqua-light) 0%, var(--aqua) 49%, var(--aqua-dark) 50%, #1e7ab8 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .badge:hover {
            background: linear-gradient(180deg, #a8d8f8 0%, #5dbcf6 49%, #3fa9f5 50%, #2a8fd4 100%);
            transform: translateY(-1px);
        }

        .badge:active {
            background: linear-gradient(180deg, #1e7ab8 0%, #2a8fd4 50%, var(--aqua-dark) 51%, var(--aqua) 100%);
            transform: translateY(0);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .badge.active {
            background: linear-gradient(180deg, #1e7ab8 0%, #2a8fd4 50%, var(--aqua-dark) 51%, var(--aqua) 100%);
            border-top: 1px solid rgba(0,0,0,0.15);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* ===== MONITOR PANEL ===== */
        .monitor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--rack);
            min-width: 0;
        }

        .monitor-frame {
            flex: 1;
            margin: 10px;
            background: #000;
            border: 1px solid var(--steel);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03);
            min-height: 0;
        }

        .monitor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: linear-gradient(180deg, var(--steel-light) 0%, var(--steel) 50%, var(--steel-dark) 100%);
            border-bottom: 1px solid var(--steel-dark);
            gap: 12px;
            flex-shrink: 0;
        }

        .monitor-toolbar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .monitor-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .monitor-ch {
            font-family: var(--font-lcd);
            font-size: 15px;
            color: var(--green);
            background: var(--lcd-bg);
            padding: 2px 8px;
            border: 1px solid var(--lcd-border);
            border-radius: 3px;
            text-shadow: 0 0 4px var(--green);
            flex-shrink: 0;
        }

        .monitor-name {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: bold;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .monitor-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .monitor-screen {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        .monitor-screen iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 0.2s;
        }

        .monitor-screen iframe[hidden] { opacity: 0; pointer-events: none; }
        .monitor-screen iframe:not([hidden]) { opacity: 1; }

        .empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: var(--text-dark);
            background: radial-gradient(ellipse at center, rgba(63,169,245,0.02) 0%, transparent 70%);
            transition: opacity 0.2s;
        }

        .empty-state.hidden { opacity: 0; pointer-events: none; }

        .empty-icon {
            width: 48px;
            height: 48px;
            background: var(--steel-dark);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--steel);
            font-size: 20px;
        }

        .empty-title {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dim);
        }

        .empty-desc {
            font-family: var(--font-body);
            font-size: 11px;
            color: var(--text-dark);
            max-width: 220px;
            text-align: center;
            line-height: 1.5;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .loading-overlay.visible { opacity: 1; pointer-events: all; }

        .loading-text {
            font-family: var(--font-lcd);
            font-size: 20px;
            color: var(--amber);
            text-shadow: 0 0 8px var(--amber), 0 0 16px rgba(255, 176, 32, 0.3);
            animation: lcd-blink 1s step-end infinite;
        }

        @keyframes lcd-blink { 50% { opacity: 0.4; } }

        @media (prefers-reduced-motion: reduce) {
            .loading-text { animation: none; }
        }

        .monitor-statusbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: linear-gradient(180deg, var(--steel-dark) 0%, #0f1620 100%);
            border-top: 1px solid var(--steel);
            flex-shrink: 0;
            gap: 12px;
        }

        .led-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green), 0 0 12px rgba(75, 255, 160, 0.3);
            display: inline-block;
            position: relative;
        }

        .led-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid var(--green);
            opacity: 0;
            animation: led-ring 2s ease-out infinite;
        }

        @keyframes led-ring {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .led-dot.tuning {
            background: var(--amber);
            box-shadow: 0 0 6px var(--amber), 0 0 12px rgba(255, 176, 32, 0.3);
            animation: led-pulse 1.2s ease-in-out infinite;
        }

        .led-dot.tuning::after {
            border-color: var(--amber);
            animation: led-ring 2s ease-out infinite;
        }

        @keyframes led-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.85); opacity: 0.6; }
        }

        @media (prefers-reduced-motion: reduce) {
            .led-dot::after, .led-dot.tuning { animation: none; }
        }

        .status-text {
            font-family: var(--font-lcd);
            font-size: 14px;
            color: var(--green);
            text-shadow: 0 0 4px var(--green);
            letter-spacing: 0.03em;
        }

        .status-text.amber {
            color: var(--amber);
            text-shadow: 0 0 4px var(--amber);
        }

        .shortcut-hint {
            display: flex;
            align-items: center;
            gap: 3px;
            font-family: var(--font-lcd);
            font-size: 12px;
            color: var(--text-dark);
        }

        .kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 5px;
            background: var(--lcd-bg);
            border: 1px solid var(--lcd-border);
            border-bottom: 2px solid var(--steel-dark);
            border-radius: 3px;
            font-family: var(--font-lcd);
            font-size: 11px;
            color: var(--text-dim);
            min-width: 20px;
            line-height: 1.3;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        .toast {
            background: var(--steel-dark);
            border: 1px solid var(--steel);
            border-radius: 4px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;

            animation: toast-in 0.2s ease-out;
            pointer-events: all;
            max-width: 280px;
        }

        .toast.toast-out { animation: toast-out 0.2s ease-out forwards; }

        @keyframes toast-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toast-out {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(6px); }
        }

        .toast-icon { width: 14px; height: 14px; flex-shrink: 0; }
        .toast-success .toast-icon { color: var(--green); }
        .toast-error .toast-icon { color: var(--amber); }

            el.innerHTML = (icons[type] || icons.error) + '<span>' + message + '</span>';

            loadingOverlay.classList.add('visible');
            loadingText.textContent = 'TUNING...';

            ledDot.classList.add('tuning');
            statusText.textContent = 'TUNING...';
            statusText.classList.add('amber');

            monitorCh.textContent = 'Ch ' + ch.num;
            monitorName.textContent = ch.name;
            document.title = ch.name + ' - TV Portal';

            reloadBtn.disabled = false;
            fullscreenBtn.disabled = false;
            prevBtn.disabled = false;

            playerFrame.src = EMBED_BASE + ch.slug;
            playerFrame.title = ch.name + ' - Live Stream';

            clearTimeout(loadTimer);
            loadTimer = setTimeout(() => {
                if (isLoading) {
                    loadingText.textContent = 'NO SIGNAL';
                    statusText.textContent = 'NO SIGNAL';
                    statusText.classList.add('amber');
                    toast(ch.name + ' signal not found', 'error');
                }
            }, LOAD_TIMEOUT);

            history.replaceState(null, '', '#' + key);
        }

        playerFrame.addEventListener('load', () => {
            if (!activeKey) return;
            isLoading = false;
            clearTimeout(loadTimer);
            loadingOverlay.classList.remove('visible');
            const ch = channels.find(c => c.key === activeKey);
            ledDot.classList.remove('tuning');
            statusText.textContent = 'RECEIVING · ' + ch.name;
            statusText.classList.remove('amber');
        });

        function reloadStream() {
            if (!activeKey) return;
            const ch = channels.find(c => c.key === activeKey);
            isLoading = true;
            loadingOverlay.classList.add('visible');
            loadingText.textContent = 'TUNING...';
            ledDot.classList.add('tuning');
            statusText.textContent = 'TUNING...';
            statusText.classList.add('amber');
            playerFrame.src = EMBED_BASE + ch.slug;
            clearTimeout(loadTimer);
            loadTimer = setTimeout(() => {
                if (isLoading) {
                    loadingText.textContent = 'NO SIGNAL';
                    statusText.textContent = 'NO SIGNAL';
                }
            }, LOAD_TIMEOUT);
        }

        function prevChannel() {
            if (!activeKey) return;
            const idx = channels.findIndex(c => c.key === activeKey);
            const prev = (idx - 1 + channels.length) % channels.length;
            loadChannel(channels[prev].key);
        }

        function nextChannel() {
            if (!activeKey) return;
            const idx = channels.findIndex(c => c.key === activeKey);
            const next = (idx + 1) % channels.length;
            loadChannel(channels[next].key);
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            } else {
                monitorFrame.requestFullscreen().catch(() => {});
            }
        }

        function clearChannel() {
            if (!activeKey) return;
            activeKey = null;
            playerFrame.hidden = true;
            playerFrame.src = '';
            emptyState.classList.remove('hidden');
            loadingOverlay.classList.remove('visible');
            ledDot.classList.remove('tuning');
            statusText.textContent = 'STANDBY';
            statusText.classList.remove('amber');
            monitorCh.textContent = '--';
            monitorName.textContent = 'Select a channel';
            reloadBtn.disabled = true;
            fullscreenBtn.disabled = true;
            prevBtn.disabled = true;
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            document.title = 'TV Portal';
            history.replaceState(null, '', '');
        }

        function toggleSidebar() {
            sidebarVisible = !sidebarVisible;
            browserPanel.style.display = sidebarVisible ? 'flex' : 'none';
            if (!sidebarVisible) toast('Sidebar hidden', 'success');
        }

        // Traffic lights
        tlClose.addEventListener('click', clearChannel);
        tlMin.addEventListener('click', toggleSidebar);
        tlMax.addEventListener('click', toggleFullscreen);

        reloadBtn.addEventListener('click', reloadStream);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        prevBtn.addEventListener('click', prevChannel);
        monitorFrame.addEventListener('dblclick', toggleFullscreen);

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderChannels();
        });

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.classList.toggle('active', !!document.fullscreenElement);
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (e.target.matches('input, textarea')) {
                if (e.key === 'Escape') e.target.blur();
                return;
            }

            if (e.key >= '1' && e.key <= '9') {
                const filtered = getFilteredChannels();
                const idx = parseInt(e.key) - 1;
                if (idx < filtered.length) loadChannel(filtered[idx].key);
                return;
            }

            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                if (!e.shiftKey) { e.preventDefault(); nextChannel(); }
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                if (!e.shiftKey) { e.preventDefault(); prevChannel(); }
            } else if (e.key === 'f' || e.key === 'F') {
                if (activeKey) toggleFullscreen();
            } else if (e.key === 'r' || e.key === 'R') {
                reloadStream();
            } else if (e.key === 'Escape') {
                if (document.fullscreenElement) document.exitFullscreen();
                else clearChannel();
            } else if (e.key === '/') {
                e.preventDefault();
                searchInput.focus();
            } else if (e.key === 'm' || e.key === 'M') {
                toggleSidebar();
            }
        });

        window.addEventListener('hashchange', () => {
            const key = location.hash.slice(1);
            if (key && key !== activeKey && channels.some(c => c.key === key)) {
                loadChannel(key);
            }
        });

        renderGelNav();
        renderBadgeRail();
        renderChannels();

        const hashKey = location.hash.slice(1);
        if (hashKey && channels.some(c => c.key === hashKey)) {
            loadChannel(hashKey);
        } else if (recent.length > 0 && channels.some(c => c.key === recent[0])) {
            loadChannel(recent[0]);
        }
    })();
    </script>
</body>
</html>
