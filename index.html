<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TV Portal</title>
    <meta name="description" content="90 live channels. Personal broadcast monitor.">
    <meta name="theme-color" content="#0f0f14">
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230f0f14'/><rect x='18' y='30' width='64' height='40' rx='6' fill='%23ffe8c8'/><rect x='24' y='36' width='16' height='28' rx='3' fill='%230f0f14'/><rect x='44' y='36' width='16' height='28' rx='3' fill='%230f0f14'/><rect x='64' y='36' width='12' height='28' rx='3' fill='%230f0f14'/></svg>">
    <style>
        :root {
            --console: #0f0f14;
            --shadow: #1a1a22;
            --grid: #2a2a35;
            --grid-hover: #323240;
            --phosphor: #ffe8c8;
            --phosphor-dim: #c4b8a4;
            --tally: #ff4d2e;
            --tally-soft: rgba(255, 77, 46, 0.12);
            --vector: #4a9e8a;
            --font-display: 'Saira Condensed', sans-serif;
            --font-body: 'Literata', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: 0.15s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: var(--font-body);
            background: var(--console);
            color: var(--phosphor);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.5;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--grid); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a48; }

        /* ===== APP GRID ===== */
        .app {
            display: grid;
            grid-template-columns: 340px 1fr;
            grid-template-rows: 52px 1fr;
            grid-template-areas: "header header" "sidebar main";
            height: 100vh;
            height: 100dvh;
            width: 100vw;
        }

        /* ===== HEADER ===== */
        .header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--console);
            border-bottom: 1px solid var(--grid);
            z-index: 100;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            text-decoration: none;
            color: var(--phosphor);
        }

        .brand-mark {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.04em;
            color: var(--phosphor);
        }

        .brand-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--phosphor-dim);
            position: relative;
            top: -2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .tally-lamp {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--tally);
            padding: 5px 14px;
            border: 1px solid rgba(255, 77, 46, 0.25);
            border-radius: 4px;
            background: var(--tally-soft);
        }

        .tally-lamp::before {
            content: '';
            width: 7px;
            height: 7px;
            background: var(--tally);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 77, 46, 0.6);
            animation: tally-pulse 2.5s ease-in-out infinite;
        }

        @keyframes tally-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.75); }
        }

        .channel-count {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--phosphor-dim);
            letter-spacing: 0.05em;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            grid-area: sidebar;
            background: var(--shadow);
            border-right: 1px solid var(--grid);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 16px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid var(--grid);
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            background: var(--console);
            border: 1px solid var(--grid);
            border-radius: 4px;
            color: var(--phosphor);
            font-family: var(--font-mono);
            font-size: 12px;
            outline: none;
            transition: border-color var(--transition);
        }

        .search-wrap input::placeholder { color: #5a5a6a; }
        .search-wrap input:focus { border-color: var(--phosphor-dim); }

        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            color: #5a5a6a;
            pointer-events: none;
        }

        .category-tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .cat-tab {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--phosphor-dim);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .cat-tab:hover {
            background: var(--console);
            color: var(--phosphor);
            border-color: var(--grid);
        }

        .cat-tab.active {
            background: var(--console);
            color: var(--phosphor);
            border-color: var(--grid);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .cat-tab .cat-count {
            font-size: 10px;
            color: #5a5a6a;
            font-weight: 700;
            transition: color var(--transition);
        }

        .cat-tab.active .cat-count { color: var(--phosphor-dim); }

        /* Channel list */
        .channel-list-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 12px;
        }

        .section-label {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #5a5a6a;
            padding: 14px 8px 4px;
            border-top: 1px solid var(--grid);
            margin-top: 4px;
        }
        .section-label:first-child { border-top: none; margin-top: 0; }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid transparent;
            position: relative;
            outline: none;
            margin-bottom: 1px;
        }

        .channel-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 0;
            background: var(--tally);
            border-radius: 0 2px 2px 0;
            transition: height var(--transition);
        }

        .channel-item:hover {
            background: var(--grid-hover);
            border-color: var(--grid);
        }

        .channel-item:hover::before { height: 14px; opacity: 0.5; }

        .channel-item:focus-visible {
            border-color: var(--phosphor-dim);
            outline: none;
        }

        .channel-item.active {
            background: var(--tally-soft);
            border-color: rgba(255, 77, 46, 0.2);
        }

        .channel-item.active::before { height: 28px; }

        .channel-item.active .channel-num {
            background: var(--tally);
            color: var(--console);
            border-color: var(--tally);
            font-weight: 700;
        }

        .channel-item.active .channel-name { color: var(--phosphor); }
        .channel-item.active .channel-tag { color: var(--tally); }

        .channel-num {
            width: 36px;
            height: 28px;
            min-width: 36px;
            background: var(--console);
            border: 1px solid var(--grid);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--phosphor-dim);
            transition: all var(--transition);
            letter-spacing: 0.02em;
        }

        .channel-info { flex: 1; min-width: 0; }

        .channel-name {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            color: var(--phosphor-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color var(--transition);
            line-height: 1.3;
        }

        .channel-item:hover .channel-name { color: var(--phosphor); }

        .channel-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5a5a6a;
            margin-top: 1px;
            transition: color var(--transition);
        }

        .channel-fav {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: #5a5a6a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all var(--transition);
            padding: 0;
            flex-shrink: 0;
        }

        .channel-item:hover .channel-fav { opacity: 1; }
        .channel-fav:hover { color: var(--tally); background: var(--tally-soft); }
        .channel-fav.is-fav { opacity: 1; color: var(--tally); }

        .empty-list {
            padding: 40px 20px;
            text-align: center;
            color: #5a5a6a;
            font-family: var(--font-mono);
            font-size: 12px;
        }

        /* ===== MAIN / PLAYER ===== */
        .main {
            grid-area: main;
            display: flex;
            flex-direction: column;
            padding: 20px 24px 24px;
            gap: 16px;
            min-width: 0;
            overflow: hidden;
        }

        .monitor {
            flex: 1;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 0 1px var(--grid), 0 16px 48px rgba(0,0,0,0.6);
        }

        .monitor:fullscreen {
            border-radius: 0;
            box-shadow: none;
        }

        /* Monitor toolbar */
        .monitor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: var(--shadow);
            border-bottom: 1px solid var(--grid);
            gap: 16px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
            flex: 1;
        }

        .monitor-tally {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--tally);
            padding: 4px 10px;
            border: 1px solid rgba(255, 77, 46, 0.2);
            border-radius: 3px;
            background: var(--tally-soft);
            flex-shrink: 0;
        }

        .monitor-tally::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--tally);
            border-radius: 50%;
            animation: tally-pulse 2.5s ease-in-out infinite;
        }

        .toolbar-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .toolbar-title {
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 600;
            color: var(--phosphor);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .toolbar-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--phosphor-dim);
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-sub .divider {
            width: 3px;
            height: 3px;
            background: var(--grid);
            border-radius: 50%;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .panel-btn {
            width: 34px;
            height: 34px;
            border-radius: 4px;
            border: 1px solid var(--grid);
            background: var(--console);
            color: var(--phosphor-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            position: relative;
        }

        .panel-btn:hover {
            background: var(--grid-hover);
            color: var(--phosphor);
            border-color: var(--phosphor-dim);
        }

        .panel-btn:active { transform: translateY(1px); }
        .panel-btn:disabled { opacity: 0.25; pointer-events: none; }
        .panel-btn svg { width: 15px; height: 15px; }

        .panel-btn.active {
            color: var(--tally);
            border-color: rgba(255, 77, 46, 0.3);
            background: var(--tally-soft);
        }

        /* Viewport */
        .monitor-viewport {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .monitor-viewport iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 0.3s ease;
        }

        .monitor-viewport iframe[hidden] { opacity: 0; pointer-events: none; }
        .monitor-viewport iframe:not([hidden]) { opacity: 1; }

        /* Tuning flash - the signature */
        .tuning-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            background: transparent;
        }

        .tuning-overlay.active {
            animation: phosphor-bloom 0.45s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .tuning-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.35) 2px,
                rgba(0, 0, 0, 0.35) 4px
            );
            opacity: 0;
        }

        .tuning-overlay.active::after {
            animation: scanline-fade 0.4s ease-out 0.05s forwards;
        }

        @keyframes phosphor-bloom {
            0% { opacity: 0; background: transparent; }
            8% { opacity: 1; background: var(--phosphor); }
            25% { opacity: 0.7; background: var(--tally); }
            60% { opacity: 0.2; background: var(--phosphor); }
            100% { opacity: 0; background: transparent; }
        }

        @keyframes scanline-fade {
            0% { opacity: 0; }
            20% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .tuning-overlay.active { animation: none; opacity: 0; }
            .tuning-overlay.active::after { animation: none; opacity: 0; }
        }

        /* Empty state */
        .empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            color: var(--phosphor-dim);
            background: radial-gradient(ellipse at center, rgba(255,232,200,0.02) 0%, transparent 70%);
            transition: opacity 0.3s ease;
        }

        .empty-state.hidden { opacity: 0; pointer-events: none; }

        .empty-icon {
            width: 56px;
            height: 56px;
            background: var(--shadow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--grid);
        }

        .empty-icon svg { width: 24px; height: 24px; color: #5a5a6a; }

        .empty-title {
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 600;
            color: var(--phosphor-dim);
        }

        .empty-desc {
            font-family: var(--font-mono);
            font-size: 12px;
            color: #5a5a6a;
            max-width: 260px;
            text-align: center;
            line-height: 1.5;
        }

        /* Loading */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.visible { opacity: 1; pointer-events: all; }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--grid);
            border-top-color: var(--tally);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--phosphor-dim);
            font-weight: 500;
        }

        /* Monitor footer */
        .monitor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: var(--shadow);
            border-top: 1px solid var(--grid);
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a5a6a;
            gap: 16px;
        }

        .status-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--vector);
            box-shadow: 0 0 8px rgba(74, 158, 138, 0.4);
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid var(--vector);
            opacity: 0;
            animation: status-ring 2s ease-out infinite;
        }

        @keyframes status-ring {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .status-dot.loading {
            background: var(--tally);
            box-shadow: 0 0 8px rgba(255, 77, 46, 0.4);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .status-dot.loading::after {
            border-color: var(--tally);
            animation: status-ring 2s ease-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.8); opacity: 0.5; }
        }

        .status-text {
            font-weight: 500;
            color: var(--phosphor-dim);
            transition: color var(--transition);
        }

        .status-text.loading { color: var(--tally); }

        .shortcuts-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            opacity: 0.6;
        }

        .kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 6px;
            background: var(--console);
            border: 1px solid var(--grid);
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            color: var(--phosphor-dim);
            min-width: 22px;
            line-height: 1.4;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--shadow);
            border: 1px solid var(--grid);
            border-radius: 4px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--phosphor);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: toast-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: all;
            max-width: 300px;
        }

        .toast.toast-out { animation: toast-out 0.2s ease-out forwards; }

        @keyframes toast-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toast-out {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(8px); }
        }

        .toast-icon { width: 16px; height: 16px; flex-shrink: 0; }
        .toast-success .toast-icon { color: var(--vector); }
        .toast-error .toast-icon { color: var(--tally); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .app { grid-template-columns: 300px 1fr; }
            .main { padding: 16px; }
        }

        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 52px auto 1fr;
                grid-template-areas: "header" "sidebar" "main";
            }
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--grid);
                max-height: 200px;
                background: var(--shadow);
            }
            .main { padding: 12px; }
            .monitor { border-radius: 4px; }
            .shortcuts-hint { display: none; }
            .header-right { gap: 12px; }
        }

        @media (max-width: 480px) {
            .header { padding: 0 16px; }
            .brand-sub { display: none; }
            .monitor-toolbar { padding: 10px 14px; }
            .monitor-footer { padding: 10px 14px; }
            .toolbar-sub .divider, .toolbar-sub .tag-part { display: none; }

        ];

        const EMBED_BASE = 'https://ritzembeds.pages.dev/play/';
        const LOAD_TIMEOUT = 15000;
        const RECENT_KEY = 'tv_recent_channels';
        const FAV_KEY = 'tv_favorites';

        let activeKey = null;
        let loadTimer = null;
        let currentFilter = 'all';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
        let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
        let isLoading = false;

        const $ = id => document.getElementById(id);
        const channelListEl = $('channelList');
        const categoryTabsEl = $('categoryTabs');
        const playerFrame = $('playerFrame');
        const monitor = $('monitor');
        const monitorViewport = $('monitorViewport');
        const tuningOverlay = $('tuningOverlay');
        const emptyState = $('emptyState');
        const loadingOverlay = $('loadingOverlay');
        const loadingText = $('loadingText');
        const toolbarTitle = $('toolbarTitle');
        const toolbarSub = $('toolbarSub');
        const footerStatus = $('footerStatus');
        const statusDot = $('statusDot');
        const channelBadge = $('channelBadge');
        const reloadBtn = $('reloadBtn');
        const fullscreenBtn = $('fullscreenBtn');
        const prevBtn = $('prevBtn');
        const searchInput = $('searchInput');
        const toastContainer = $('toastContainer');

        function getTagCounts() {
            const counts = { all: channels.length };
            channels.forEach(ch => { counts[ch.tag] = (counts[ch.tag] || 0) + 1; });
            return counts;
        }

        function getFilteredChannels() {
            return channels.filter(ch => {
                const matchFilter = currentFilter === 'all' || currentFilter === 'Favorites'
                    ? (currentFilter === 'all' || favorites.includes(ch.key))
                    : ch.tag === currentFilter;
                const matchSearch = !searchQuery ||
                    ch.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    ch.num.includes(searchQuery) ||
                    ch.tag.toLowerCase().includes(searchQuery.toLowerCase());
                return matchFilter && matchSearch;
            });
        }

        function saveRecent(key) {
            recent = recent.filter(k => k !== key);
            recent.unshift(key);
            if (recent.length > 10) recent = recent.slice(0, 10);
            localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
        }

        function toggleFavorite(key, event) {
            if (event) event.stopPropagation();
            const idx = favorites.indexOf(key);
            const ch = channels.find(c => c.key === key);
            if (idx > -1) {
                favorites.splice(idx, 1);
                toast(ch.name + ' removed from favorites', 'error');
            } else {
                favorites.push(key);
                toast(ch.name + ' added to favorites', 'success');
            }
            localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
            renderChannels();
            if (currentFilter === 'Favorites') renderCategoryTabs();
        }

        function toast(message, type) {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            const icons = {
                success: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>',
                error: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
            };
            el.innerHTML = (icons[type] || icons.error) + '<span>' + message + '</span>';
            toastContainer.appendChild(el);
            setTimeout(() => {
                el.classList.add('toast-out');
                setTimeout(() => el.remove(), 200);
            }, 2200);
        }

        function renderCategoryTabs() {
            const counts = getTagCounts();
            const tags = ['All', 'Favorites', 'Sports', 'Kids', 'Movies', 'Broadcast', 'Entertainment', 'News', 'Documentary', 'Music', 'Lifestyle'];

            categoryTabsEl.innerHTML = tags.map(tag => {
                const count = tag === 'Favorites' ? favorites.length : (counts[tag] || 0);
                const isActive = currentFilter === tag || (currentFilter === 'all' && tag === 'All');
                if (tag === 'Favorites' && count === 0 && currentFilter !== 'Favorites') return '';
                return '<button class="cat-tab ' + (isActive ? 'active' : '') + '" data-filter="' + (tag === 'All' ? 'all' : tag) + '">' +
                    '<span>' + tag + '</span>' +
                    '<span class="cat-count">' + count + '</span>' +
                    '</button>';
            }).join('');

            categoryTabsEl.querySelectorAll('.cat-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentFilter = tab.dataset.filter;
                    renderCategoryTabs();
                    renderChannels();
                });
            });
        }

        function renderChannels() {
            const filtered = getFilteredChannels();
            channelListEl.innerHTML = '';

            if (filtered.length === 0) {
                channelListEl.innerHTML = '<div class="empty-list">No channels found</div>';
                channelBadge.textContent = '0 channels';
                return;
            }

            let currentTag = null;
            filtered.forEach((ch, index) => {
                if (currentFilter === 'all' && currentTag !== ch.tag) {
                    currentTag = ch.tag;
                    const label = document.createElement('div');
                    label.className = 'section-label';
                    label.textContent = ch.tag;
                    channelListEl.appendChild(label);
                }

                const item = document.createElement('div');
                item.className = 'channel-item';
                item.dataset.key = ch.key;
                item.tabIndex = 0;
                item.setAttribute('role', 'button');
                item.setAttribute('aria-label', ch.name + ' - ' + ch.tag);

                const isFav = favorites.includes(ch.key);
                item.innerHTML =
                    '<div class="channel-num">' + ch.num + '</div>' +
                    '<div class="channel-info">' +
                        '<div class="channel-name">' + ch.name + '</div>' +
                        '<div class="channel-tag">' + ch.tag + '</div>' +
                    '</div>' +
                    '<button class="channel-fav ' + (isFav ? 'is-fav' : '') + '" title="' + (isFav ? 'Remove favorite' : 'Add favorite') + '">' +
                        '<svg width="14" height="14" viewBox="0 0 24 24" fill="' + (isFav ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
                    '</button>';

                item.addEventListener('click', () => loadChannel(ch.key));
                item.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        loadChannel(ch.key);
                    }
                });

                const favBtn = item.querySelector('.channel-fav');
                favBtn.addEventListener('click', (e) => toggleFavorite(ch.key, e));

                channelListEl.appendChild(item);
            });

            if (activeKey) {
                const activeItem = channelListEl.querySelector('[data-key="' + activeKey + '"]');
                if (activeItem) {
                    activeItem.classList.add('active');
                    activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }

            channelBadge.textContent = filtered.length + ' channel' + (filtered.length !== 1 ? 's' : '');
        }

        function triggerTuningFlash() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            tuningOverlay.classList.remove('active');
            void tuningOverlay.offsetWidth; // force reflow
            tuningOverlay.classList.add('active');
            setTimeout(() => tuningOverlay.classList.remove('active'), 500);
        }

        function loadChannel(key) {
            const ch = channels.find(c => c.key === key);
            if (!ch || activeKey === key) return;

            activeKey = key;
            isLoading = true;
            saveRecent(key);
            triggerTuningFlash();

            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.toggle('active', el.dataset.key === key);
            });

            const activeItem = channelListEl.querySelector('[data-key="' + key + '"]');
            if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

            emptyState.classList.add('hidden');
            playerFrame.hidden = false;
            loadingOverlay.classList.add('visible');
            loadingText.textContent = 'Tuning ' + ch.name + '...';

            statusDot.classList.add('loading');
            footerStatus.textContent = 'Tuning...';
            footerStatus.classList.add('loading');

            toolbarTitle.textContent = ch.name;
            toolbarSub.innerHTML = '<span>' + ch.tag + '</span><span class="divider"></span><span>Ch ' + ch.num + '</span>';
            document.title = ch.name + ' · TV Portal';

            reloadBtn.disabled = false;
            fullscreenBtn.disabled = false;
            prevBtn.disabled = false;

            playerFrame.src = EMBED_BASE + ch.slug;
            playerFrame.title = ch.name + ' - Live Stream';

            clearTimeout(loadTimer);
            loadTimer = setTimeout(() => {
                if (isLoading) {
                    loadingText.textContent = 'Signal unavailable';
                    footerStatus.textContent = 'No signal';
                    toast(ch.name + ' signal not found', 'error');
                }
            }, LOAD_TIMEOUT);

            history.replaceState(null, '', '#' + key);
        }

        playerFrame.addEventListener('load', () => {
            if (!activeKey) return;
            isLoading = false;
            clearTimeout(loadTimer);
            loadingOverlay.classList.remove('visible');
            const ch = channels.find(c => c.key === activeKey);
            statusDot.classList.remove('loading');
            footerStatus.textContent = 'Receiving · ' + ch.name;
            footerStatus.classList.remove('loading');
        });

        function reloadStream() {
            if (!activeKey) return;
            const ch = channels.find(c => c.key === activeKey);
            isLoading = true;
            triggerTuningFlash();
            loadingOverlay.classList.add('visible');
            loadingText.textContent = 'Retuning ' + ch.name + '...';
            statusDot.classList.add('loading');
            footerStatus.textContent = 'Retuning...';
            footerStatus.classList.add('loading');
            playerFrame.src = EMBED_BASE + ch.slug;
            clearTimeout(loadTimer);
            loadTimer = setTimeout(() => {
                if (isLoading) {
                    loadingText.textContent = 'Signal unavailable';
                    footerStatus.textContent = 'No signal';
                }
            }, LOAD_TIMEOUT);
        }

        function prevChannel() {
            if (!activeKey) return;
            const idx = channels.findIndex(c => c.key === activeKey);
            const prev = (idx - 1 + channels.length) % channels.length;
            loadChannel(channels[prev].key);
        }

        function nextChannel() {
            if (!activeKey) return;
            const idx = channels.findIndex(c => c.key === activeKey);
            const next = (idx + 1) % channels.length;
            loadChannel(channels[next].key);
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            } else {
                monitor.requestFullscreen().catch(() => {});
            }
        }

        reloadBtn.addEventListener('click', reloadStream);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        prevBtn.addEventListener('click', prevChannel);
        monitor.addEventListener('dblclick', toggleFullscreen);

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderChannels();
        });

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.classList.toggle('active', !!document.fullscreenElement);
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (e.target.matches('input, textarea')) {
                if (e.key === 'Escape') e.target.blur();
                return;
            }

            if (e.key >= '1' && e.key <= '9') {
                const filtered = getFilteredChannels();
                const idx = parseInt(e.key) - 1;
                if (idx < filtered.length) loadChannel(filtered[idx].key);
                return;
            }

            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                if (!e.shiftKey) { e.preventDefault(); nextChannel(); }
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                if (!e.shiftKey) { e.preventDefault(); prevChannel(); }
            } else if (e.key === 'f' || e.key === 'F') {
                if (activeKey) toggleFullscreen();
            } else if (e.key === 'r' || e.key === 'R') {
                reloadStream();
            } else if (e.key === 'Escape') {
                if (document.fullscreenElement) document.exitFullscreen();
            } else if (e.key === '/') {
                e.preventDefault();
                searchInput.focus();
            }
        });

        window.addEventListener('hashchange', () => {
            const key = location.hash.slice(1);
            if (key && key !== activeKey && channels.some(c => c.key === key)) {
                loadChannel(key);
            }
        });

        renderCategoryTabs();
        renderChannels();

        const hashKey = location.hash.slice(1);
        if (hashKey && channels.some(c => c.key === hashKey)) {
            loadChannel(hashKey);
        } else if (recent.length > 0 && channels.some(c => c.key === recent[0])) {
            loadChannel(recent[0]);
        } else {
            loadChannel('skysport8nz');
        }
    })();
    </script>
</body>
</html>
